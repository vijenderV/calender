<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calendar Application <background-color:red></background-color:red></title>
    <style>
        body { font-family: Arial, sans-serif; }
        .calendar { width: 100%; max-width: 600px; margin: auto; border: 1px solid #ccc; border-radius: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #f4f4f4; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day { padding: 15px; text-align: center; border: 1px solid #eee; }
        .today { background-color: red; }
    </style>
</head>
<body>
    <div class="calendar">
        <div class="header">
            <button id="prev" style="background-color: pink; padding: 10px 20px; border: none; cursor: pointer;">Previous</button>
            <h2 id="monthTitle"></h2>
            <button id="next" style="background-color: pink; padding: 10px 20px; border: none; cursor: pointer;">next</button>
        <button onclick="addEvent()">Add Event</button>
<input type="text" id="eventInput" placeholder="Event name">
        </div>
        
        <div class="days" id="days">
            <!-- Days will be dynamically generated here -->
        </div>
    </div>
    <script>
        const monthTitle = document.getElementById('monthTitle');
        const daysContainer = document.getElementById('days');
        const prevButton = document.getElementById('prev');
        const nextButton = document.getElementById('next');

        let currentDate = new Date();

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthTitle.innerText = currentDate.toLocaleString('default', { month: 'long' }) + ' ' + year;
            daysContainer.innerHTML = '';

            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const today = new Date();

            // Add empty cells for days from the previous month
            for (let i = 0; i < firstDayOfMonth.getDay(); i++) {
                daysContainer.innerHTML += '<div class="day"></div>';
            }

            // Add day cells for the current month
            for (let day = 1; day <= lastDayOfMonth.getDate(); day++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                daysContainer.innerHTML += `<div class="day ${isToday ? 'today' : ''}">${day}</div>`;
            }
        }

        prevButton.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextButton.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        function addEvent() {
    let eventName = document.getElementById("eventInput").value;
    if (eventName) {
        console.log("Event added: " + eventName);
        // Store in local storage
        // Display on calendar
    }
}

        renderCalendar();
        
    </script>
</body>
</html>
