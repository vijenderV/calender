<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calendar Application <background-color:red></background-color:red></title>
    <style>
        body { font-family: Arial, sans-serif; }
        .calendar { width: 100%; max-width: 600px; margin: auto; border: 1px solid #ccc; border-radius: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #f4f4f4; }
        .days { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day { padding: 15px; text-align: center; border: 1px solid #eee; }
        .today { background-color: red; }
    </style>
</head>
<body>
    <div class="calendar">
        <div class="header">
            <button id="prev" style="background-color: pink; padding: 10px 20px; border: none; cursor: pointer;">Previous</button>
            <h2 id="monthTitle"></h2>
            <button id="next" style="background-color: pink; padding: 10px 20px; border: none; cursor: pointer;">next</button>
        <button onclick="addEvent()">Add Event</button>
<input type="text" id="eventInput" placeholder="Event name">
        </div>
        
        <div class="days" id="days">
            <!-- Days will be dynamically generated here -->
        </div>
    </div>
    <script>
        const monthTitle = document.getElementById('monthTitle');
        const daysContainer = document.getElementById('days');
        const prevButton = document.getElementById('prev');
        const nextButton = document.getElementById('next');

        let currentDate = new Date();

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthTitle.innerText = currentDate.toLocaleString('default', { month: 'long' }) + ' ' + year;
            daysContainer.innerHTML = '';

            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const today = new Date();

            // Add empty cells for days from the previous month
            for (let i = 0; i < firstDayOfMonth.getDay(); i++) {
                daysContainer.innerHTML += '<div class="day"></div>';
            }

            // Add day cells for the current month
            for (let day = 1; day <= lastDayOfMonth.getDate(); day++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                daysContainer.innerHTML += `<div class="day ${isToday ? 'today' : ''}">${day}</div>`;
            }
        }

        prevButton.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextButton.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        function addEvent() {
    let eventName = document.getElementById("eventInput").value;
    if (eventName) {
        console.log("Event added: " + eventName);
        // Store in local storage
        // Display on calendar

    }
}

        renderCalendar();
        
    </script>
    <!-- Event Modal -->
<div id="eventModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border:2px solid #333; border-radius:10px; z-index:1000; box-shadow:0 0 20px rgba(0,0,0,0.3);">
    <h3>Add Event</h3>
    <p>Date: <span id="selectedDate"></span></p>
    <input type="text" id="eventInput" placeholder="Enter event name" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;">
    <button onclick="saveEvent()" style="background-color:pink; padding:10px 20px; cursor:pointer; margin-right:10px; border-radius:5px;">Save Event</button>
    <button onclick="closeModal()" style="background-color:#ccc; padding:10px 20px; cursor:pointer; border-radius:5px;">Close</button>
</div>

<!-- Modal Overlay (background) -->
<div id="modalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;" onclick="closeModal()"></div>

<script>
    let selectedDate = null;
    let events = {}; // Store events: { "2026-03-15": ["Event 1", "Event 2"] }

    // Make dates clickable
    function makeClickable() {
        let dateCells = document.querySelectorAll('.calendar-date, .date-cell, [data-date]');
        dateCells.forEach(cell => {
            cell.style.cursor = 'pointer';
            cell.addEventListener('click', function() {
                let dateText = this.textContent.trim();
                if (dateText && !isNaN(dateText)) {
                    openModal(dateText);
                }
            });
        });
    }

    // Open modal when date is clicked
    function openModal(date) {
        selectedDate = date;
        document.getElementById('selectedDate').textContent = date;
        document.getElementById('eventInput').value = '';
        document.getElementById('eventModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }

    // Close modal
    function closeModal() {
        document.getElementById('eventModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
        selectedDate = null;
    }

    // Save event
    function saveEvent() {
        let eventName = document.getElementById('eventInput').value.trim();
        if (eventName && selectedDate) {
            if (!events[selectedDate]) {
                events[selectedDate] = [];
            }
            events[selectedDate].push(eventName);
            
            // Display event on calendar
            displayEventOnDate(selectedDate, eventName);
            
            // Save to local storage
            localStorage.setItem('calendarEvents', JSON.stringify(events));
            
            closeModal();
            alert('Event added: ' + eventName);
        } else {
            alert('Please enter an event name');
        }
    }

    // Display event on the date cell
    function displayEventOnDate(date, eventName) {
        let dateCells = document.querySelectorAll('.calendar-date, .date-cell, [data-date]');
        dateCells.forEach(cell => {
            if (cell.textContent.trim() === date) {
                let eventDiv = document.createElement('div');
                eventDiv.textContent = '• ' + eventName;
                eventDiv.style.fontSize = '12px';
                eventDiv.style.color = 'pink';
                eventDiv.style.fontWeight = 'bold';
                eventDiv.style.marginTop = '5px';
                cell.appendChild(eventDiv);
            }
        });
    }

    // Load events from local storage on page load
    function loadEvents() {
        let savedEvents = localStorage.getItem('calendarEvents');
        if (savedEvents) {
            events = JSON.parse(savedEvents);
            for (let date in events) {
                events[date].forEach(eventName => {
                    displayEventOnDate(date, eventName);
                });
            }
        }
    }

    // Run when page loads
    window.addEventListener('load', function() {
        makeClickable();
        loadEvents();
    });
</script>
</body>
</html>
